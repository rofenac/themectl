# themectl theme definition: Tokyo Night
# Source: folke/tokyonight.nvim (storm variant)

[meta]
name        = "tokyonight"
label       = "Tokyo Night"
dark        = true

[tools]
vim         = "tokyonight"
bat         = "Catppuccin Mocha"
vivid       = "tokyonight-night"
eza         = "tokyonight"

[tools.vim_extra]
g_tokyonight_style = "'night'"

[tools.lightline]
colorscheme = "OldHope"

[alacritty.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[alacritty.cursor]
text   = "#1a1b26"
cursor = "#c0caf5"

[alacritty.selection]
text       = "#1a1b26"
background = "#364a82"

[alacritty.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[alacritty.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"
