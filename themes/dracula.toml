# themectl theme definition: Dracula
# Source: dracula/dracula-theme

[meta]
name        = "dracula"
label       = "Dracula"
dark        = true

[tools]
vim         = "dracula"
bat         = "Dracula"
vivid       = "dracula"
eza         = "dracula"

[tools.vim_extra]

[tools.lightline]
colorscheme = "darcula"

[alacritty.primary]
background = "#282a36"
foreground = "#f8f8f2"

[alacritty.cursor]
text   = "#282a36"
cursor = "#f8f8f2"

[alacritty.selection]
text       = "#f8f8f2"
background = "#44475a"

[alacritty.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[alacritty.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"
