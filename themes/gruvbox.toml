# themectl theme definition: Gruvbox Dark
# Source: morhetz/gruvbox + SylEleuth/gruvbox-plus-gtk

[meta]
name        = "gruvbox"
label       = "Gruvbox Dark"
dark        = true

[tools]
vim         = "gruvbox"
bat         = "gruvbox-dark"
vivid       = "gruvbox-dark"
eza         = "gruvbox-dark"

# vim extra settings injected after `colorscheme`
[tools.vim_extra]
g_gruvbox_contrast_dark = "'hard'"
g_gruvbox_sign_column   = "'bg0'"
g_gruvbox_italics       = "1"

[tools.lightline]
colorscheme = "deus"

# Alacritty 16-color ANSI palette + primary colors
[alacritty.primary]
background = "#1d2021"
foreground = "#ebdbb2"

[alacritty.cursor]
text   = "#1d2021"
cursor = "#fe8019"

[alacritty.selection]
text       = "#ebdbb2"
background = "#fe8019"

[alacritty.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[alacritty.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"
